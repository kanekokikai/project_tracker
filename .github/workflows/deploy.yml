name: Deploy to Xserver

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo_mysql, openssl, tokenizer, xml, ctype, json, bcmath, fileinfo
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Ensure storage directories
        run: |
          mkdir -p storage/framework/{cache,sessions,views} storage/logs bootstrap/cache
          chmod -R 775 storage bootstrap/cache || true

      - name: Write production .env from secret
        env:
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
        run: |
          if [ -z "$PRODUCTION_ENV" ]; then
            echo "GitHub Secret PRODUCTION_ENV が未設定です。"
            echo ".env.production.example を参考に Secrets へ登録してください。"
            exit 1
          fi
          printf '%s\n' "$PRODUCTION_ENV" > .env
          php -r '
            $env = file_get_contents(".env");
            if (!preg_match("/^APP_KEY=base64:.+/m", $env)) {
              $key = "base64:" . base64_encode(random_bytes(32));
              if (preg_match("/^APP_KEY=.*/m", $env)) {
                $env = preg_replace("/^APP_KEY=.*/m", "APP_KEY=" . $key, $env, 1);
              } else {
                $env .= "\nAPP_KEY=" . $key . "\n";
              }
              file_put_contents(".env", $env);
              fwrite(STDERR, "APP_KEY を新規発行しました。Secrets の PRODUCTION_ENV にも同じ値を反映してください。\n");
            }
          '
      - name: Cache Laravel config
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.git*/**
            **/.github*
            **/.github*/**
            **/node_modules/**
            **/tests/**
            **/phpunit.xml
            **/.env.example
            **/.env.production.example
            **/public/uploads/**
            **/uploads/**
            **/*.md
            **/RELEASE.md
            release_via_github.bat
            tools/release_via_github.ps1
            tools/winscp/**
            database/*.sql
            **/*.local.sql
