name: Deploy to Xserver

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, pdo_mysql, openssl, tokenizer, xml, ctype, json, bcmath, fileinfo, zip
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Prune vendor extras
        run: |
          find vendor -type d \( -iname tests -o -iname docs -o -name .git \) -prune -exec rm -rf {} + 2>/dev/null || true

      - name: Ensure storage directories
        run: |
          mkdir -p storage/framework/{cache,sessions,views} storage/logs bootstrap/cache
          chmod -R 775 storage bootstrap/cache || true

      - name: Write production .env from secret
        env:
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
        run: |
          if [ -z "$PRODUCTION_ENV" ]; then
            echo "GitHub Secret PRODUCTION_ENV is missing."
            exit 1
          fi
          printf '%s\n' "$PRODUCTION_ENV" | sed '1s/^\xEF\xBB\xBF//' > .env
          php -r '
            $env = file_get_contents(".env");
            if (!preg_match("/^APP_KEY=base64:.+/m", $env)) {
              $key = "base64:" . base64_encode(random_bytes(32));
              if (preg_match("/^APP_KEY=.*/m", $env)) {
                $env = preg_replace("/^APP_KEY=.*/m", "APP_KEY=" . $key, $env, 1);
              } else {
                $env .= "\nAPP_KEY=" . $key . "\n";
              }
              file_put_contents(".env", $env);
            }
          '
          SETUP_TOKEN=$(grep -E '^APP_SETUP_TOKEN=' .env | head -n1 | cut -d= -f2- | tr -d '\r')
          if [ -z "$SETUP_TOKEN" ]; then
            echo "APP_SETUP_TOKEN missing in PRODUCTION_ENV"
            exit 1
          fi
          echo "$SETUP_TOKEN" > unpack.token
          echo "SETUP_TOKEN=$SETUP_TOKEN" >> "$GITHUB_ENV"

      - name: Cache Laravel config
        run: |
          php artisan config:clear || true
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: Build release.zip
        run: |
          rm -rf deploy-ftp release.zip
          mkdir -p deploy-ftp/public
          zip -r release.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "node_modules/*" \
            -x "tests/*" \
            -x "deploy-ftp/*" \
            -x "public/uploads/project_files/*" \
            -x "uploads/*" \
            -x "*.md" \
            -x "tools/*" \
            -x "release_via_github.bat" \
            -x "database/*.sql" \
            -x ".env.example" \
            -x ".env.production.example" \
            -x "phpunit.xml" \
            -x "release.zip"
          cp release.zip deploy-ftp/release.zip
          cp unpack.token deploy-ftp/unpack.token
          cp public/unpack-release.php deploy-ftp/unpack-release.php
          mkdir -p deploy-ftp/public
          cp public/unpack-release.php deploy-ftp/public/unpack-release.php
          ls -lh deploy-ftp/release.zip

      - name: Upload release package via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          security: loose
          timeout: 600000
          local-dir: ./deploy-ftp/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          dangerous-clean-slate: false
          log-level: standard

      - name: Unpack on server
        run: |
          echo "Triggering unpack..."
          for i in 1 2 3 4 5; do
            for path in unpack-release.php public/unpack-release.php; do
              code=$(curl -sS -o /tmp/unpack-out.txt -w "%{http_code}" \
                "https://project.kanekokikai-app.com/${path}?token=${SETUP_TOKEN}" || true)
              echo "attempt=$i path=$path http=$code"
              cat /tmp/unpack-out.txt || true
              if [ "$code" = "200" ] && grep -q '^OK' /tmp/unpack-out.txt; then
                exit 0
              fi
            done
            sleep 5
          done
          echo "Unpack failed"
          exit 1
